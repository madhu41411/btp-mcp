services:
  - type: web
    name: btp-mcp-server
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    port: 8000
    healthCheckPath: /health
    envVars:
      - key: SAP_BTP_BASE_URL
        sync: false
      - key: SAP_BTP_TOKEN_URL
        sync: false
      - key: SAP_BTP_CLIENT_ID
        sync: false
      - key: SAP_BTP_CLIENT_SECRET
        sync: false
      - key: SAP_BTP_API_PATH
        value: /api/v1
      - key: SAP_BTP_TIMEOUT_SECONDS
        value: "30"
      - key: API_KEY
        sync: false
