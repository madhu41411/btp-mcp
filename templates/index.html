<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTP Integration Suite - iFlow Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f1117;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 960px;
            background: #1a1d27;
            border-radius: 16px;
            border: 1px solid #2a2d3e;
            box-shadow: 0 24px 80px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 820px;
        }

        .header {
            background: #1a1d27;
            border-bottom: 1px solid #2a2d3e;
            padding: 18px 24px;
            border-radius: 16px 16px 0 0;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #00b4d8, #0077b6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .header-text h1 {
            font-size: 16px;
            font-weight: 600;
            color: #e8eaf0;
            letter-spacing: 0.01em;
        }

        .header-text p {
            font-size: 12px;
            color: #6b7280;
            margin-top: 2px;
        }

        .header-status {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #22c55e;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 6px #22c55e;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scrollbar-width: thin;
            scrollbar-color: #2a2d3e transparent;
        }

        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb { background: #2a2d3e; border-radius: 4px; }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.25s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message.user { justify-content: flex-end; }
        .message.assistant { justify-content: flex-start; }

        .message-content {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #0077b6, #00b4d8);
            color: #fff;
            border-radius: 12px 12px 2px 12px;
        }

        .message.assistant .message-content {
            background: #252836;
            color: #d1d5db;
            border-radius: 12px 12px 12px 2px;
            border: 1px solid #2a2d3e;
        }

        .message.error .message-content {
            background: #2d1b1b;
            color: #f87171;
            border: 1px solid #7f1d1d;
        }

        .data-display {
            margin-top: 10px;
            padding: 12px;
            background: #1a1d27;
            border-left: 3px solid #00b4d8;
            border-radius: 6px;
            font-size: 13px;
            overflow-x: auto;
        }

        .iflows-list { display: flex; flex-direction: column; gap: 8px; }

        .iflow-item {
            padding: 10px 12px;
            background: #252836;
            border: 1px solid #2a2d3e;
            border-radius: 8px;
            font-size: 13px;
        }

        .iflow-name { font-weight: 600; color: #00b4d8; }
        .iflow-details { font-size: 12px; color: #6b7280; margin-top: 4px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
            margin-top: 8px;
        }

        .stat-card {
            background: #252836;
            border: 1px solid #2a2d3e;
            border-radius: 10px;
            padding: 14px;
            text-align: center;
        }

        .stat-value { font-size: 22px; font-weight: 700; }
        .stat-label { font-size: 11px; color: #6b7280; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

        .suggestions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 8px;
            margin-top: 10px;
        }

        .suggestion {
            padding: 8px 12px;
            background: #1e2130;
            border: 1.5px solid #6b7280;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            color: #e2e8f0;
            transition: all 0.15s;
            text-align: center;
        }

        .suggestion:hover {
            background: #2e3347;
            border-color: #00b4d8;
            color: #00b4d8;
        }

        .loading { display: flex; gap: 5px; align-items: center; padding: 4px 0; }

        .loading span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #00b4d8;
            animation: bounce 1.3s infinite;
        }

        .loading span:nth-child(2) { animation-delay: 0.15s; }
        .loading span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounce {
            0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
            40%            { opacity: 1;   transform: translateY(-8px); }
        }

        .input-area {
            padding: 16px 24px 20px;
            border-top: 1px solid #2a2d3e;
            background: #1a1d27;
            border-radius: 0 0 16px 16px;
        }

        .input-form { display: flex; gap: 10px; }

        .input-field {
            flex: 1;
            padding: 12px 16px;
            background: #252836;
            border: 1px solid #2a2d3e;
            border-radius: 10px;
            font-size: 14px;
            color: #e8eaf0;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-field::placeholder { color: #4b5563; }

        .input-field:focus {
            border-color: #00b4d8;
            box-shadow: 0 0 0 3px rgba(0, 180, 216, 0.12);
        }

        .send-btn {
            padding: 12px 22px;
            background: linear-gradient(135deg, #0077b6, #00b4d8);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .send-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 180, 216, 0.35);
        }

        .send-btn:active { transform: translateY(0); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .error-message { color: #f87171; font-size: 12px; margin-top: 5px; }

        .info-badge {
            display: inline-block;
            background: #0c2d3f;
            color: #00b4d8;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-right: 5px;
        }

        @media (max-width: 600px) {
            .message-content { max-width: 100%; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .suggestions { grid-template-columns: 1fr 1fr; }
            .header-text h1 { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-logo">⚡</div>
            <div class="header-text">
                <h1>BTP Integration Suite</h1>
                <p>iFlow Manager &amp; Monitor</p>
            </div>
            <div class="header-status">
                <div class="status-dot"></div>
                Connected
            </div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message assistant">
                <div class="message-content">
                    <div>👋 Hello! I'm your BTP Integration Suite assistant.</div>
                    <div style="margin-top: 10px; font-size: 13px; color: #9ca3af;">I can help you with:</div>
                    <div class="suggestions" style="margin-top: 10px;">
                        <div class="suggestion" onclick="quickAction('iflows')">List iflows</div>
                        <div class="suggestion" onclick="quickAction('stats')">Show stats</div>
                        <div class="suggestion" onclick="quickAction('packages')">List packages</div>
                        <div class="suggestion" onclick="quickAction('errors')">Show errors</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <form class="input-form" onsubmit="handleSubmit(event)">
                <input 
                    type="text" 
                    id="messageInput" 
                    class="input-field" 
                    placeholder="Ask about iflows, packages, statistics, errors, or deployment status..." 
                    autocomplete="off"
                >
                <button type="submit" class="send-btn" id="sendBtn">Send</button>
            </form>
            <div id="errorContainer" class="error-message"></div>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const errorContainer = document.getElementById('errorContainer');

        function addMessage(content, isUser = false, data = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            if (typeof content === 'string') {
                contentDiv.innerHTML = content;
            } else {
                contentDiv.appendChild(content);
            }

            messageDiv.appendChild(contentDiv);
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;

            if (data) {
                displayData(messageDiv, data);
            }
        }

        function displayData(parentDiv, data) {
            const responseType = data.type || 'text';
            let dataHtml = '';
            console.log('displayData called with:', data);

            if (responseType === 'iflows_list' && Array.isArray(data.data)) {
                const iflows = data.data;
                console.log('Displaying iflows_list with', iflows.length, 'items');
                dataHtml = '<div class="iflows-list">';
                const displayCount = Math.min(iflows.length, 25);
                iflows.slice(0, displayCount).forEach((iflow, idx) => {
                    dataHtml += `
                        <div class="iflow-item">
                            <div class="iflow-name">${iflow.Name || iflow.Id}</div>
                            <div class="iflow-details">
                                ID: ${iflow.Id}<br>
                                Package: ${iflow.PackageName || 'N/A'}
                            </div>
                        </div>
                    `;
                });
                if (iflows.length > displayCount) {
                    dataHtml += `<div style="text-align: center; color: #999; font-size: 12px; margin-top: 10px;">... and ${iflows.length - displayCount} more</div>`;
                }
                dataHtml += '</div>';
            } else if (responseType === 'statistics' && data.data) {
                const stats = data.data;
                const statusData = stats.by_status || {};
                dataHtml = '<div class="stats-grid">';
                for (const [status, count] of Object.entries(statusData)) {
                    const color = status === 'COMPLETED' ? '#2e7d32' : status.includes('FAIL') || status === 'ERROR' ? '#c62828' : '#667eea';
                    dataHtml += `
                        <div class="stat-card">
                            <div class="stat-value" style="color:${color}">${count}</div>
                            <div class="stat-label">${status}</div>
                        </div>
                    `;
                }
                dataHtml += '</div>';
                const messages = stats.messages || [];
                if (messages.length > 0) {
                    dataHtml += `
                        <table style="width:100%;border-collapse:collapse;margin-top:12px;font-size:12px;">
                            <thead>
                                <tr style="background:#f0f0f0;text-align:left;">
                                    <th style="padding:8px;border-bottom:2px solid #ddd;">iFlow Name</th>
                                    <th style="padding:8px;border-bottom:2px solid #ddd;">Status</th>
                                    <th style="padding:8px;border-bottom:2px solid #ddd;">Message ID</th>
                                    <th style="padding:8px;border-bottom:2px solid #ddd;">Correlation ID</th>
                                    <th style="padding:8px;border-bottom:2px solid #ddd;">Started</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;
                    messages.forEach(msg => {
                        const statusColor = msg.Status === 'COMPLETED' ? '#2e7d32' : msg.Status.includes('FAIL') || msg.Status === 'ERROR' ? '#c62828' : '#555';
                        dataHtml += `
                            <tr style="border-bottom:1px solid #eee;">
                                <td style="padding:8px;font-weight:600;color:#667eea">${msg.IFlowName || '-'}</td>
                                <td style="padding:8px;color:${statusColor};font-weight:600">${msg.Status}</td>
                                <td style="padding:8px;font-family:monospace;font-size:11px;color:#333">${msg.MessageGuid || '-'}</td>
                                <td style="padding:8px;font-family:monospace;font-size:11px;color:#333">${msg.CorrelationId || '-'}</td>
                                <td style="padding:8px;color:#666">${msg.LogStart || '-'}</td>
                            </tr>
                        `;
                    });
                    dataHtml += '</tbody></table>';
                }
            } else if (responseType === 'packages' && data.data) {
                const packages = data.data;
                dataHtml = '<div class="iflows-list">';
                for (const [pkgId, iflows] of Object.entries(packages)) {
                    dataHtml += `
                        <div class="iflow-item">
                            <div class="iflow-name">${iflows[0]?.PackageName || pkgId}</div>
                            <div class="iflow-details">${iflows.length} iflow(s)</div>
                        </div>
                    `;
                }
                dataHtml += '</div>';
            } else if (responseType === 'errors' && data.data) {
                const errData = data.data;
                dataHtml = `<div class="stat-card" style="background: #fee; border-left-color: #c33;">
                    <div class="stat-value" style="color: #c33;">${errData.failed_count}</div>
                    <div class="stat-label">Failed/Error Messages</div>
                </div>`;
            }

            if (dataHtml) {
                const dataDiv = document.createElement('div');
                dataDiv.className = 'data-display';
                dataDiv.innerHTML = dataHtml;
                parentDiv.appendChild(dataDiv);
                chatArea.scrollTop = chatArea.scrollHeight;
            }
        }

        const QUICK_ACTIONS = {
            iflows:   { label: 'List all iflows',  url: '/api/iflows',   type: 'iflows_list',  dataKey: 'data' },
            stats:    { label: 'Show statistics',  url: '/api/stats',    type: 'statistics',   dataKey: 'data' },
            packages: { label: 'List packages',    url: '/api/packages', type: 'packages_raw', dataKey: 'data' },
            errors:   { label: 'Show errors',      url: '/api/errors',   type: 'errors',       dataKey: 'data' },
        };

        async function quickAction(key) {
            const action = QUICK_ACTIONS[key];
            addMessage(action.label, true);

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.innerHTML = '<span></span><span></span><span></span>';
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.appendChild(loadingDiv);
            messageDiv.appendChild(contentDiv);
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const response = await fetch(action.url);
                const result = await response.json();
                messageDiv.remove();

                if (!result.success) {
                    addMessage('❌ ' + (result.error || 'Request failed'), false);
                    return;
                }

                let fakeResponse = { type: action.type, data: result[action.dataKey] };

                if (key === 'iflows') {
                    fakeResponse.summary = `Found ${result.count} iflow(s)`;
                } else if (key === 'stats') {
                    const s = result.data || {};
                    fakeResponse.summary = `Total messages: ${s.total_messages || 0}`;
                } else if (key === 'packages') {
                    fakeResponse = { type: 'packages', data: {}, summary: '' };
                    const pkgs = result.data || [];
                    const grouped = {};
                    pkgs.forEach(p => { grouped[p.Id] = [{ PackageName: p.Name, Id: p.Id }]; });
                    fakeResponse.data = grouped;
                    fakeResponse.summary = `Found ${pkgs.length} package(s)`;
                } else if (key === 'errors') {
                    fakeResponse.summary = `Found ${(result.data || {}).failed_count || 0} failed/error message(s)`;
                }

                addMessage(fakeResponse.summary, false, fakeResponse);
            } catch (err) {
                messageDiv.remove();
                addMessage('❌ Error: ' + err.message, false);
            }
        }

        async function sendMessage(text) {
            if (!text.trim()) return;

            errorContainer.innerHTML = '';
            messageInput.value = '';
            sendBtn.disabled = true;

            addMessage(text, true);

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.innerHTML = '<span></span><span></span><span></span>';
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.appendChild(loadingDiv);
            messageDiv.appendChild(contentDiv);
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: text })
                });

                const result = await response.json();
                console.log('Received response:', result);
                messageDiv.remove();

                if (result.response) {
                    const summary = result.response.summary || 'Done';
                    addMessage(summary, false, result.response);
                } else if (result.error) {
                    addMessage('❌ ' + result.error, false);
                } else {
                    addMessage('Sorry, I encountered an error processing your request.', false);
                }
            } catch (error) {
                messageDiv.remove();
                addMessage('❌ Error: ' + error.message, false);
            } finally {
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        function handleSubmit(event) {
            event.preventDefault();
            const text = messageInput.value.trim();
            if (text) {
                sendMessage(text);
            }
        }

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSubmit(e);
            }
        });

        messageInput.focus();
    </script>
</body>
</html>
